name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Verify package
        run: bun run verify:pack

  plugin-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install OpenCode
        run: npm i -g opencode-ai@1.4.3

      - name: Smoke plugin install
        run: |
          set -euo pipefail
          export HOME="$(mktemp -d)"
          export XDG_CONFIG_HOME="$HOME/.config"
          export XDG_DATA_HOME="$HOME/.local/share"
          export XDG_CACHE_HOME="$HOME/.cache"

          TARBALL="$(npm pack | tail -n 1)"
          SPEC="opencode-supabase@file:$(pwd)/$TARBALL"

          WORKDIR="$(mktemp -d)"
          cd "$WORKDIR"
          git init -q

          opencode plugin "$SPEC"
          opencode debug config | jq -e --arg spec "$SPEC" '.plugin_origins | any(.spec == $spec and .scope == "local")'
